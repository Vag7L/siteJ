
<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ============================================================
     ΤΙΤΛΟΣ ΚΑΡΤΕΛΑΣ (φαίνεται στην καρτέλα/tab του browser)
     Άλλαξέ τον αν θέλεις.
     ============================================================ -->
<title>Έγγραφα προς Λήψη</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap&subset=greek,greek-ext,latin" rel="stylesheet">

<style>
  :root {
    --paper:   #f7f6f3;
    --ink:     #1c1c1a;
    --muted:   #6b6b66;
    --accent:  #9a3b2e;
    --hairline:#e3e1da;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 88px 24px 120px;
  }

  /* ---------- Επικεφαλίδα ---------- */
  .eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 18px;
  }

  h1 {
    font-family: "IBM Plex Serif", Georgia, serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin: 0 0 18px;
  }

  .intro {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 52ch;
    margin: 0 0 56px;
  }

  /* ---------- Λίστα εγγράφων ---------- */
  .docs {
    counter-reset: doc;
    border-top: 1px solid var(--hairline);
  }

  .doc {
    counter-increment: doc;
    display: flex;
    align-items: baseline;
    gap: 20px;
    padding: 22px 4px;
    border-bottom: 1px solid var(--hairline);
    text-decoration: none;
    color: inherit;
    transition: padding-left 0.18s ease, color 0.18s ease;
  }

  .doc::before {
    content: counter(doc, decimal-leading-zero);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.8rem;
    color: var(--muted);
    min-width: 2ch;
    padding-top: 2px;
    transition: color 0.18s ease;
  }

  .doc-title {
    flex: 1;
    font-size: 1.2rem;
    font-weight: 500;
  }

  .doc-action {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    white-space: nowrap;
    transition: color 0.18s ease;
  }
  .doc-action::after { content: " \2193"; } /* βέλος προς τα κάτω */

  .doc:hover,
  .doc:focus-visible {
    padding-left: 14px;
    color: var(--accent);
    outline: none;
  }
  .doc:hover::before,
  .doc:focus-visible::before,
  .doc:hover .doc-action,
  .doc:focus-visible .doc-action {
    color: var(--accent);
  }
  .doc:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }

  /* ---------- Υποσέλιδο ---------- */
  footer {
    margin-top: 64px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  @media (prefers-reduced-motion: reduce) {
    .doc, .doc::before, .doc-action { transition: none; }
  }
</style>
</head>

<body>
  <main class="wrap">

    <!-- ============================================================
         ΕΠΙΚΕΦΑΛΙΔΑ
         • .eyebrow  = μικρό κείμενο πάνω από τον τίτλο (προαιρετικό)
         • h1        = ο ΜΕΓΑΛΟΣ τίτλος — άλλαξέ τον εδώ
         • .intro    = μικρή περιγραφή κάτω από τον τίτλο (προαιρετικό)
         ============================================================ -->
    <p class="eyebrow">Αρχείο</p>
    <h1>Έγγραφα προς Λήψη</h1>
    <p class="intro">Κατεβάστε τα παρακάτω αρχεία σε μορφή PDF. Κάντε κλικ σε οποιοδήποτε έγγραφο για να ξεκινήσει η λήψη.</p>

    <!-- ============================================================
         ΛΙΣΤΑ ΕΓΓΡΑΦΩΝ
         Κάθε <a class="doc"> ... </a> είναι ΕΝΑ έγγραφο.
         Για να προσθέσεις: αντίγραψε ένα ολόκληρο μπλοκ <a>…</a> και κόλλησέ το.
         Για να αφαιρέσεις: σβήσε ένα ολόκληρο μπλοκ <a>…</a>.
         Η αρίθμηση (01, 02, …) μπαίνει ΑΥΤΟΜΑΤΑ — δεν χρειάζεται να την αλλάζεις.

         Σε κάθε σύνδεσμο άλλαξε:
           • href="..."      → το όνομα/διαδρομή του αρχείου PDF
           • doc-title       → το όνομα που βλέπει ο χρήστης
         ============================================================ -->
    <nav class="docs">

      <a class="doc" href="document-1.pdf" download>
        <span class="doc-title">Όνομα εγγράφου 1</span>
        <span class="doc-action">Λήψη PDF</span>
      </a>

      <a class="doc" href="document-2.pdf" download>
        <span class="doc-title">Όνομα εγγράφου 2</span>
        <span class="doc-action">Λήψη PDF</span>
      </a>

      <a class="doc" href="document-3.pdf" download>
        <span class="doc-title">Όνομα εγγράφου 3</span>
        <span class="doc-action">Λήψη PDF</span>
      </a>

      <a class="doc" href="document-4.pdf" download>
        <span class="doc-title">Όνομα εγγράφου 4</span>
        <span class="doc-action">Λήψη PDF</span>
      </a>

      <a class="doc" href="document-5.pdf" download>
        <span class="doc-title">Όνομα εγγράφου 5</span>
        <span class="doc-action">Λήψη PDF</span>
      </a>

    </nav>

    <!-- ============================================================
         ΥΠΟΣΕΛΙΔΟ (προαιρετικό) — άλλαξε ή σβήσε το
         ============================================================ -->
    <footer>© 2026 — Όλα τα δικαιώματα διατηρούνται</footer>

  </main>
</body>
</html>
